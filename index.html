<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#C62828">
<title>CDC Fit — Fazer Pedido</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; }
  
  /* Mobile: full screen */
  body { background: #f5f5f5; }
  #app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: white; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,.1); }

  /* Desktop: centered with branded background */
  @media (min-width: 700px) {
    body {
      background: #8E0000;
      background-image: 
        radial-gradient(circle at 20% 20%, #C62828 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #6B0000 0%, transparent 50%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      min-height: 100vh;
    }
    #app {
      max-width: 430px;
      width: 100%;
      min-height: calc(100vh - 80px);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.1);
      margin: 0;
      position: relative;
    }
    .bottom-bar {
      border-radius: 0 0 24px 24px;
    }
    /* Desktop sidebar info */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }
  }

  @media (min-width: 1000px) {
    body {
      align-items: center;
      padding: 40px;
      gap: 60px;
    }
    body::after {
      content: 'CDC🍲Fit\A Central dos Congelados\A\A Delivery ABCDM\A e São Paulo\A\A (11) 99118-5018';
      white-space: pre;
      color: rgba(255,255,255,0.85);
      font-size: 15px;
      line-height: 2;
      font-weight: 500;
      letter-spacing: 0.02em;
      position: fixed;
      left: calc(50% - 430px - 80px);
      transform: translateX(-100%);
      top: 50%;
      transform: translateY(-50%);
    }
  }
  .hdr { background: #C62828; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .hdr-logo { color: white; font-size: 20px; font-weight: 900; letter-spacing: -.5px; }
  .hdr-logo span { font-size: 11px; display: block; font-weight: 500; opacity: .85; letter-spacing: 0; }
  .cart-btn { background: white; border: none; border-radius: 20px; padding: 6px 12px; display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: 700; font-size: 13px; color: #C62828; }
  .steps { display: flex; padding: 12px 16px 0; gap: 4px; }
  .step-dot { flex: 1; height: 3px; border-radius: 2px; background: #eee; transition: background .3s; }
  .step-dot.active { background: #C62828; }
  .step-dot.done { background: #C62828; opacity: .4; }
  .content { flex: 1; padding: 16px; overflow-y: auto; padding-bottom: 90px; }
  .section-title { font-size: 18px; font-weight: 800; color: #1a1a1a; margin-bottom: 4px; }
  .section-sub { font-size: 13px; color: #888; margin-bottom: 16px; }
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .mode-card { border: 2px solid #E0E0E0; border-radius: 12px; padding: 18px 12px; text-align: center; cursor: pointer; transition: all .2s; background: white; }
  .mode-card:active { transform: scale(.97); }
  .mode-card.selected { border-color: #C62828; background: #FFF5F5; }
  .mode-card .mc-icon { font-size: 28px; margin-bottom: 8px; }
  .mode-card .mc-title { font-size: 13px; font-weight: 700; color: #1a1a1a; line-height: 1.3; }
  .mode-card .mc-sub { font-size: 11px; color: #888; margin-top: 2px; }
  .disc-info-title { font-size: 11px; font-weight: 800; color: #1a1a1a; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .disc-blocks { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 6px; }
  .disc-block { background: white; border: 1.5px solid #FFCDD2; border-radius: 10px; padding: 8px 4px; text-align: center; }
  .disc-block .db-qty { font-size: 9px; color: #888; margin-bottom: 3px; line-height: 1.3; }
  .disc-block .db-pct { font-size: 14px; font-weight: 900; color: #C62828; line-height: 1; }
  .disc-block .db-off { font-size: 9px; color: #C62828; font-weight: 700; }
  .disc-block.pix-block { border-color: #C8E6C9; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 12px; }
  .disc-block.pix-block .db-pct { font-size: 22px; color: #2E7D32; }
  .disc-block.pix-block .db-off { font-size: 11px; color: #2E7D32; }
  .disc-note { font-size: 10px; color: #aaa; font-style: italic; margin-top: 6px; }
  .cat-scroll { display: flex; gap: 6px; overflow-x: auto; padding: 0 0 8px; margin-bottom: 12px; scrollbar-width: none; }
  .cat-scroll::-webkit-scrollbar { display: none; }
  .cat-tab { background: #f0f0f0; border: none; border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 700; color: #555; white-space: nowrap; cursor: pointer; transition: all .2s; flex-shrink: 0; }
  .cat-tab.active { background: #C62828; color: white; }
  .item-card { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
  .item-thumb { width: 64px; height: 64px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: #f0f0f0; }
  .item-info { flex: 1; }
  .item-num { font-size: 20px; font-weight: 900; color: #C62828; min-width: 36px; background: #FFF0F0; border-radius: 8px; padding: 2px 6px; text-align: center; display: inline-block; margin-bottom: 3px; }
  .item-name { font-size: 12px; color: #1a1a1a; line-height: 1.35; margin: 1px 0; }
  .item-meta { font-size: 10px; color: #aaa; }
  .item-price { font-size: 13px; font-weight: 800; color: #1a1a1a; white-space: nowrap; margin-right: 6px; }
  .item-badge { font-size: 8px; font-weight: 900; padding: 2px 5px; border-radius: 99px; margin-left: 3px; vertical-align: middle; }
  .badge-new { background: #F9A825; color: #5D3B00; }
  .badge-fit { background: #2E7D32; color: white; }
  .qty-ctrl { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: none; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .qty-btn.minus { background: #f0f0f0; color: #555; }
  .qty-btn.plus { background: #C62828; color: white; }
  .qty-btn:active { transform: scale(.9); }
  .qty-val { font-size: 14px; font-weight: 800; min-width: 20px; text-align: center; }
  .kit-card { border: 2px solid #E0E0E0; border-radius: 12px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: all .2s; }
  .kit-card:active { transform: scale(.98); }
  .kit-card.selected { border-color: #C62828; background: #FFF5F5; }
  .kit-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
  .kit-badge { font-size: 9px; font-weight: 900; background: #C62828; color: white; padding: 3px 8px; border-radius: 99px; text-transform: uppercase; letter-spacing: .06em; }
  .kit-badge.gold { background: #F9A825; color: #5D3B00; }
  .kit-badge.green { background: #2E7D32; }
  .kit-name { font-size: 14px; font-weight: 800; color: #1a1a1a; margin: 4px 0 2px; }
  .kit-qtd { font-size: 11px; color: #888; }
  .kit-price { font-size: 24px; font-weight: 900; color: #1a1a1a; }
  .kit-items-list { font-size: 13px; color: #444; line-height: 1.9; border-top: 1px solid #f0f0f0; padding-top: 8px; margin-top: 6px; }
  .kit-items-list b { color: #C62828; font-size: 15px; }
  .pgto-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 16px; }
  .pgto-btn { border: 2px solid #e0e0e0; border-radius: 10px; padding: 10px 6px; text-align: center; cursor: pointer; background: white; transition: all .2s; }
  .pgto-btn.selected { border-color: #C62828; background: #FFF5F5; }
  .pgto-btn:active { transform: scale(.95); }
  .pgto-btn .pg-label { font-size: 11px; font-weight: 800; color: #1a1a1a; }
  .pgto-btn .pg-sub { font-size: 9px; color: #C62828; font-weight: 700; margin-top: 2px; }
  .pgto-btn.selected .pg-label { color: #C62828; }
  .dlv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .dlv-btn { border: 2px solid #e0e0e0; border-radius: 10px; padding: 14px; text-align: center; cursor: pointer; background: white; transition: all .2s; }
  .dlv-btn.selected { border-color: #C62828; background: #FFF5F5; }
  .dlv-btn:active { transform: scale(.97); }
  .dlv-btn .dv-icon { font-size: 24px; margin-bottom: 4px; }
  .dlv-btn .dv-label { font-size: 13px; font-weight: 800; color: #1a1a1a; }
  .dlv-btn.selected .dv-label { color: #C62828; }
  .addr-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .field label { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: .05em; }
  .field input, .field textarea { border: 1.5px solid #e0e0e0; border-radius: 10px; padding: 11px 12px; font-size: 14px; outline: none; font-family: inherit; resize: none; transition: border-color .2s; }
  .field input:focus, .field textarea:focus { border-color: #C62828; }
  .summ-block { background: #f9f9f9; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
  .summ-row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; font-size: 13px; }
  .summ-row.total { border-top: 1.5px solid #e0e0e0; margin-top: 6px; padding-top: 10px; }
  .summ-row.total span:first-child { font-size: 15px; font-weight: 800; }
  .summ-row.total span:last-child { font-size: 18px; font-weight: 900; color: #C62828; }
  .summ-label { color: #666; }
  .summ-value { font-weight: 600; }
  .summ-discount { color: #2E7D32; font-weight: 700; }
  .summ-items { border: 1px solid #f0f0f0; border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
  .summ-item { display: flex; gap: 8px; padding: 9px 12px; border-bottom: 1px solid #f8f8f8; font-size: 12px; }
  .summ-item:last-child { border-bottom: none; }
  .summ-item-num { color: #C62828; font-weight: 900; min-width: 24px; }
  .summ-item-name { flex: 1; color: #333; line-height: 1.35; }
  .summ-item-price { color: #1a1a1a; font-weight: 700; white-space: nowrap; }
  .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: white; border-top: 1px solid #eee; padding: 10px 16px; display: flex; gap: 8px; z-index: 40; }
  .btn { flex: 1; border: none; border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 800; cursor: pointer; transition: all .2s; }
  .btn:active { transform: scale(.97); }
  .btn-back { background: #f0f0f0; color: #555; }
  .btn-next { background: #C62828; color: white; }
  .btn-next:disabled { background: #ccc; cursor: not-allowed; }
  .btn-wa { background: #25D366; color: white; font-size: 15px; }
  .btn-copy { background: #1a1a1a; color: white; }
  .disc-bar { background: #E8F5E9; border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-size: 11px; color: #2E7D32; font-weight: 700; }
  .vol-info { background: #FFF5F5; border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-size: 11px; color: #C62828; font-weight: 600; }
  .mini-cart { background: #1a1a1a; color: white; border-radius: 12px; padding: 10px 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  .mc-left { font-size: 12px; color: rgba(255,255,255,.75); }
  .mc-left b { color: white; font-size: 14px; }
  .mc-right { font-size: 16px; font-weight: 900; }
</style>
</head>

const itemMap = {};
ITEMS.forEach(i => itemMap[i.id] = i);

let state = {
  step:0, mode:null, kit:null, cart:{}, cat:'carnes',
  payment:null, delivery:null,
  nome:'', telefone:'',
  rua:'', numero:'', complemento:'', bairro:'', cep:'', cidade:'',
  obs:''
};

const fmt = n => 'R$ ' + n.toFixed(2).replace('.', ',');
const totalQty = () => Object.values(state.cart).reduce((a,b) => a+b, 0);

function subtotal() {
  const kitPrice = (state.mode === 'kit' && state.kit) ? state.kit.price : 0;
  const avulsoPrice = Object.entries(state.cart).reduce((s,[id,q]) => {
    const it = itemMap[Number(id)]; return s + (it ? it.price * q : 0);
  }, 0);
  return kitPrice + avulsoPrice;
}

function volDisc() {
  const q = totalQty();
  if (q >= 40) return .06; if (q >= 30) return .05;
  if (q >= 20) return .04; if (q >= 14) return .02; return 0;
}

function avulsoSubtotal() {
  return Object.entries(state.cart).reduce((s,[id,q]) => {
    const it = itemMap[Number(id)]; return s + (it ? it.price * q : 0);
  }, 0);
}

function calcTotal() {
  const kitPrice = (state.mode === 'kit' && state.kit) ? state.kit.price : 0;
  const avulso = avulsoSubtotal();
  const vdRate = volDisc();
  const vd = avulso * vdRate;
  const sub = kitPrice + avulso;
  const after = sub - vd;
  const pix = state.payment === 'pix' ? after * .03 : 0;
  return { sub, kitPrice, avulso, vd, vdRate, after, pix, total: after - pix };
}

function fullAddress() {
  let a = state.rua;
  if (state.numero) a += ', ' + state.numero;
  if (state.complemento) a += ' ' + state.complemento;
  if (state.bairro) a += ' — ' + state.bairro;
  if (state.cep) a += ' — CEP ' + state.cep;
  if (state.cidade) a += ' — ' + state.cidade;
  return a;
}

// Batched render — captures all rapid taps before rebuilding DOM
let _renderPending = false;
function scheduleRender() {
  if (_renderPending) return;
  _renderPending = true;
  requestAnimationFrame(() => { _renderPending = false; render(); });
}

const addItem = id => {
  state.cart[id] = (state.cart[id] || 0) + 1;
  // Update counter immediately without full re-render
  const el = document.getElementById('cart-count-hdr');
  if (el) el.textContent = totalQty();
  scheduleRender();
};

const removeItem = id => {
  if (!state.cart[id]) return;
  if (state.cart[id] > 1) state.cart[id]--; else delete state.cart[id];
  const el = document.getElementById('cart-count-hdr');
  if (el) el.textContent = totalQty();
  scheduleRender();
};

function goStep(s) {
  if (s === 1 && !state.mode) return;
  state.step = s; render();
  document.getElementById('content-area').scrollTop = 0;
}

const canNext = () => {
  if (state.step === 0) return !!state.mode;
  if (state.step === 1) return state.mode === 'kit' ? !!state.kit : totalQty() > 0;
  if (state.step === 2) {
    if (!state.nome || !state.telefone) return false;
    if (!state.payment || !state.delivery) return false;
    if (state.delivery === 'delivery' && (!state.rua || !state.numero || !state.bairro || !state.cep || !state.cidade)) return false;
    return true;
  }
  return true;
};

function renderSteps() {
  for (let i = 0; i < 5; i++) {
    const el = document.getElementById('sd' + i); if (!el) continue;
    el.className = 'step-dot';
    if (i < state.step) el.classList.add('done');
    else if (i === state.step) el.classList.add('active');
  }
}

  const {sub,vd,after,pix,total} = calcTotal();
  const pgLabel = PGTOS.find(p=>p.id===state.payment)?.label || '';

  let itemsHtml = '';
  if (state.mode === 'kit' && state.kit) {
    const extraRows = Object.entries(state.cart).map(([id,q]) => {
      const it = itemMap[Number(id)]; if (!it) return '';
      return `<div class="summ-item">
        <div class="summ-item-num">#${id}</div>
        <div class="summ-item-name">${q>1?q+'x ':''}<span style="font-size:11px;">${it.name}</span></div>

        <div class="summ-item-name" style="font-weight:700;">${state.kit.name} — ${state.kit.qty} refeições</div>

function generateMsg() {
  try {
    const {sub, kitPrice, avulso, vd, vdRate, after, pix, total} = calcTotal();
    const pgLabel = PGTOS.find(p=>p.id===state.payment)?.label || '';
    let m = '🍱 *PEDIDO CDC FIT*\n\n';
    m += `👤 *Cliente:* ${state.nome}\n`;
    m += `📱 *Telefone:* ${state.telefone}\n`;
    m += `📦 *Tipo:* ${state.mode==='kit'?'Kit':'Avulso'}\n`;
    m += `🚗 *Entrega:* ${state.delivery==='delivery'?'Delivery':'Retirada'}\n`;
    if (state.delivery === 'delivery') {
      m += `📍 *Endereço:*\n`;
      m += `   Rua: ${state.rua}, ${state.numero}`;
      if (state.complemento) m += ` ${state.complemento}`;
      m += `\n   Bairro: ${state.bairro}\n`;
      m += `   CEP: ${state.cep}\n`;
      m += `   Cidade: ${state.cidade}\n`;
    }
    m += `💳 *Pagamento:* ${pgLabel}${state.payment==='pix'?' (3% off)':''}\n\n*Itens:*\n`;
    if (state.mode==='kit' && state.kit) {
      m += `✅ ${state.kit.name} — ${state.kit.qty} refeições — ${fmt(state.kit.price)}\n`;
      if (Object.keys(state.cart).length > 0) {
        m += `\n*Itens extras avulsos:*\n`;
        Object.entries(state.cart).forEach(([id,q]) => {
          const it = itemMap[Number(id)];
          if (it) m += `• ${q>1?q+'x ':''}#${id} ${it.name} — ${fmt(it.price*q)}\n`;
        });
      }
    } else {
      Object.entries(state.cart).forEach(([id,q]) => {
        const it = itemMap[Number(id)];
        if (it) m += `• ${q>1?q+'x ':''}#${id} ${it.name} — ${fmt(it.price*q)}\n`;
      });
    }
    m += `\n*Subtotal:* ${fmt(sub)}`;
    if (kitPrice > 0 && avulso > 0) {
      m += ` (Kit: ${fmt(kitPrice)} + Extras: ${fmt(avulso)})`;
    }
    if (vdRate > 0) m += `\n*Desconto volume (${(vdRate*100).toFixed(0)}%):* −${fmt(vd)}`;
    if (pix > 0) m += `\n*Desconto PIX (3%):* −${fmt(pix)}`;
    m += `\n*TOTAL PRODUTOS: ${fmt(total)}*`;
    if (state.delivery==='delivery') m += `\n⚠️ *Frete:* A calcular e confirmar com o cliente`;
    if (state.obs) m += `\n\n📝 *Obs:* ${state.obs}`;
    m += '\n\nObrigado! 😊';
    return m;
  } catch(e) {
    console.error('generateMsg error:', e);
    return '🍱 PEDIDO CDC FIT\nErro ao gerar mensagem. Por favor tente novamente.';
  }
}

function sendWA() {
  try {
    const msg = generateMsg();
    const url = 'https://wa.me/' + WA + '?text=' + encodeURIComponent(msg);
    const win = window.open(url, '_blank');
    if (!win) {
      // Popup blocked — try location redirect
      window.location.href = url;
    }
  } catch(e) {
    alert('Erro ao abrir WhatsApp. Tente copiar o pedido e enviar manualmente.');
    console.error(e);
  }
}

function copyOrder() {
  const msg = generateMsg(), btn = document.getElementById('copy-btn');
  const done = () => { if(btn){btn.textContent='✓ Copiado!'; setTimeout(()=>{btn.textContent='📋 Copiar';},2000);} };
  if (navigator.clipboard) navigator.clipboard.writeText(msg).then(done).catch(() => {
    const ta=document.createElement('textarea');ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done();
  });
  else { const ta=document.createElement('textarea');ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done(); }
}

function renderBottom() {
  const bar = document.getElementById('bottom-bar'); if (!bar) return;
  const ok = canNext();
  if (state.step===0) bar.innerHTML=`<button class="btn btn-next"${ok?'':' disabled'} onclick="goStep(1)">Continuar →</button>`;
  else if(state.step===1) bar.innerHTML=`<button class="btn btn-back" onclick="goStep(0)">← Voltar</button><button class="btn btn-next"${ok?'':' disabled'} onclick="goStep(2)">Próximo →</button>`;
  else if(state.step===2) bar.innerHTML=`<button class="btn btn-back" onclick="goStep(1)">← Voltar</button><button class="btn btn-next"${ok?'':' disabled'} onclick="goStep(3)">Próximo →</button>`;
  else if(state.step===3) bar.innerHTML=`<button class="btn btn-back" onclick="goStep(2)">← Voltar</button><button class="btn btn-next" onclick="goStep(4)">Ver Resumo →</button>`;
  else bar.innerHTML=`<button class="btn btn-copy" id="copy-btn" onclick="copyOrder()">📋 Copiar</button><button class="btn btn-wa" onclick="sendWA()">🟢 WhatsApp</button>`;
}

function setCat(cat) { state.cat = cat; render(); }

function render() {
  const c = document.getElementById('content-area'); if (!c) return;
  renderSteps();
  document.getElementById('cart-count-hdr').textContent = totalQty();
  renderBottom();
  if (state.step===0) c.innerHTML = renderStep0();
  else if(state.step===1) c.innerHTML = state.mode==='kit' ? renderStep1Kit() : renderStep1Avulso();
  else if(state.step===2) c.innerHTML = renderStep2();
  else if(state.step===3) c.innerHTML = renderStep3();
  else c.innerHTML = renderStep4();
}

render();
</script>
