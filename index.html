  .vol-info { background: #FFF5F5; border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-size: 11px; color: #C62828; font-weight: 600; }
  .mini-cart { background: #1a1a1a; color: white; border-radius: 12px; padding: 10px 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }

  {id:'k10a', badge:'Kit 10', name:'Conheça Nossos Sabores', qty:10, price:169.90, note:'Livre escolha',          items:[1,2,5,7,8,9,12,13,14,20]},
  {id:'k14',  badge:'Kit 14', name:'Kit Sabores',            qty:14, price:229.90, note:'2 de cada sabor',        items:[1,2,7,8,9,13,14,20,12,5]},
  {id:'k10b', badge:'Kit 10', name:'Vida Leve Saborosa',     qty:10, price:169.00, note:'2 de cada (5 sabores)',  items:[1,7,9,10,14], badgeCls:'green'},
  {id:'k20',  badge:'Kit 20', name:'Dupla de Sabores',       qty:20, price:319.90, note:'2 de cada (10 sabores)', items:[1,2,3,5,7,8,9,11,13,14]},
  {id:'k30',  badge:'Kit 30', name:'Família',                qty:30, price:459.90, note:'2 de cada (15 sabores)', items:[1,2,3,5,6,7,8,9,11,12,13,14,15,26,27]},
  {id:'k40',  badge:'Kit 40', name:'Pacotão Família',        qty:40, price:599.90, note:'4 de cada (10 sabores)', items:[1,2,3,5,7,8,9,12,13,14], badgeCls:'gold'},
];

const CATS = [
  {id:'carnes',    label:'🥩 Carnes'},
  {id:'frangos',   label:'🍗 Frangos'},
  {id:'massas',    label:'🍝 Massas'},
  {id:'caldos',    label:'🍲 Caldos'},
  {id:'novidades', label:'🔥 Novidades'},
  {id:'sobremesas',label:'🍮 Sobremesas'},
];

const PGTOS = [
  {id:'pix',    label:'PIX',    sub:'3% off'},
  {id:'debito', label:'Débito', sub:''},
  {id:'credito',label:'Crédito',sub:''},
  {id:'alelo',  label:'Alelo',  sub:''},
  {id:'vr',     label:'VR',     sub:''},
  {id:'ticket', label:'Ticket', sub:''},
  {id:'sodexo', label:'Sodexo', sub:''},
  {id:'pluxee', label:'Pluxee', sub:''},
];

const itemMap = {};
ITEMS.forEach(i => itemMap[i.id] = i);

let state = { step:0, mode:null, kit:null, cart:{}, cat:'carnes', payment:null, delivery:null, address:'', obs:'' };

const fmt = n => 'R$ ' + n.toFixed(2).replace('.', ',');
const totalQty = () => Object.values(state.cart).reduce((a,b) => a+b, 0);

function subtotal() {
  if (state.mode === 'kit' && state.kit) return state.kit.price;
  return Object.entries(state.cart).reduce((s,[id,q]) => {
    const it = itemMap[Number(id)]; return s + (it ? it.price * q : 0);
  }, 0);
}

function volDisc() {
  if (state.mode === 'kit') return 0;
  const q = totalQty();
  if (q >= 40) return .06; if (q >= 30) return .05;
  if (q >= 20) return .04; if (q >= 14) return .02; return 0;
}

function calcTotal() {
  const sub = subtotal(), vd = state.mode === 'kit' ? 0 : sub * volDisc();
  const after = sub - vd, pix = state.payment === 'pix' ? after * .03 : 0;
  return { sub, vd, after, pix, total: after - pix };
}

const addItem = id => { state.cart[id] = (state.cart[id] || 0) + 1; render(); };
const removeItem = id => {
  if (!state.cart[id]) return;
  if (state.cart[id] > 1) state.cart[id]--; else delete state.cart[id];
  render();
};

function goStep(s) {
  if (s === 1 && !state.mode) return;
  state.step = s; render();
  document.getElementById('content-area').scrollTop = 0;
}

const canNext = () => {
  if (state.step === 0) return !!state.mode;
  if (state.step === 1) return state.mode === 'kit' ? !!state.kit : totalQty() > 0;
  if (state.step === 2) return !!state.payment && !!state.delivery;
  return true;
};

function renderSteps() {
  for (let i = 0; i < 5; i++) {
    const el = document.getElementById('sd' + i); if (!el) continue;
    el.className = 'step-dot';
    if (i < state.step) el.classList.add('done');
    else if (i === state.step) el.classList.add('active');
  }
}

function renderStep0() {
  return `<p class="section-title">Olá! 👋</p>
  <p class="section-sub">Como você quer montar seu pedido?</p>
  <div class="mode-grid">
    <div class="mode-card${state.mode==='kit'?' selected':''}" onclick="state.mode='kit';render()">
      <div class="mc-icon">📦</div><div class="mc-title">Escolher um Kit</div><div class="mc-sub">Combos prontos com desconto</div>
    </div>
    <div class="mode-card${state.mode==='avulso'?' selected':''}" onclick="state.mode='avulso';render()">
      <div class="mc-icon">✏️</div><div class="mc-title">Montar meu Pedido</div><div class="mc-sub">Escolha item por item</div>
    </div>
  </div>
  <div style="background:#f9f9f9;border-radius:10px;padding:12px 14px;font-size:11px;color:#888;line-height:1.8;">
    🏷️ <b style="color:#1a1a1a;">Descontos por volume</b> (pedido avulso):<br>
    14–19 itens = <b style="color:#C62828;">2% off</b> &nbsp;·&nbsp; 20–29 = <b style="color:#C62828;">4% off</b><br>
    30–39 = <b style="color:#C62828;">5% off</b> &nbsp;·&nbsp; 40+ = <b style="color:#C62828;">6% off</b><br>
    PIX acumula + <b style="color:#C62828;">3% off</b>
  </div>`;
}

function renderStep1Kit() {
  return KITS.map(k => `
  <div class="kit-card${state.kit&&state.kit.id===k.id?' selected':''}" onclick="state.kit=KITS.find(x=>x.id==='${k.id}');render()">
    <div class="kit-header">
      <div>
        <span class="kit-badge${k.badgeCls?' '+k.badgeCls:''}">${k.badge}</span>
        <p class="kit-name">${k.name}</p>
        <p class="kit-qtd">${k.note}</p>
      </div>
      <div style="text-align:right;">
        <p class="kit-price">${fmt(k.price)}</p>
        <p style="font-size:10px;color:#888;">${fmt(k.price/k.qty)}/un</p>
        ${state.kit&&state.kit.id===k.id?'<div style="color:#C62828;font-size:20px;margin-top:4px;">✓</div>':''}
      </div>
    </div>
    <div class="kit-items-list">
      ${k.items.slice(0,6).map(id=>`<b>${id}</b> ${itemMap[id]?itemMap[id].name.split(',')[0]:''}`).join(' · ')}${k.items.length>6?` · +${k.items.length-6} mais`:''}
    </div>
  </div>`).join('');
}

function renderStep1Avulso() {
  const q = totalQty(), vd = volDisc();
  let discBar = '';
  if (q === 0) discBar = `<div class="vol-info">💡 Adicione 14+ itens para ganhar desconto de volume</div>`;
  else if (vd > 0) {
    let prox = '';
    if(q<20) prox=' — adicione '+(20-q)+' para 4% off';
    else if(q<30) prox=' — adicione '+(30-q)+' para 5% off';
    else if(q<40) prox=' — adicione '+(40-q)+' para 6% off';
    discBar = `<div class="disc-bar">✅ Desconto ${(vd*100).toFixed(0)}% ativado! (${q} itens)${prox}</div>`;
  } else discBar = `<div class="vol-info">💡 Adicione mais ${14-q} iten${14-q>1?'s':''} para ativar desconto</div>`;

  const catTabs = CATS.map(c =>
    `<button class="cat-tab${state.cat===c.id?' active':''}" onclick="state.cat='${c.id}';render()">${c.label}</button>`
  ).join('');

  const items = ITEMS.filter(i => i.cat === state.cat).map(it => {
    const qty = state.cart[it.id] || 0;
    const b = (it.isNew ? `<span class="item-badge badge-new">NOVO</span>` : '') +
              (it.fit  ? `<span class="item-badge badge-fit">FIT</span>`  : '');
    return `<div class="item-card">
      <div class="item-info">
        <div class="item-num">#${it.id}</div>
        <div class="item-name">${it.name}${b}</div>
        <div class="item-meta">${it.info}</div>
      </div>
      <span class="item-price">${fmt(it.price)}</span>
      <div class="qty-ctrl">
        ${qty > 0 ? `<button class="qty-btn minus" onclick="removeItem(${it.id})">−</button><span class="qty-val">${qty}</span>` : ''}
        <button class="qty-btn plus" onclick="addItem(${it.id})">+</button>
      </div>
    </div>`;
  }).join('');

  const cartBar = q > 0 ? `<div class="mini-cart">
    <div class="mc-left"><b>${q}</b> iten${q>1?'s':''} no carrinho</div>
    <div class="mc-right">${fmt(subtotal())}</div>
  </div>` : '';

  return discBar + `<div class="cat-scroll">${catTabs}</div>` + cartBar + items;
}

function renderStep2() {
  const pgtos = PGTOS.map(p => `
  <div class="pgto-btn${state.payment===p.id?' selected':''}" onclick="state.payment='${p.id}';render()">
    <div class="pg-label">${p.label}</div>
    ${p.sub ? `<div class="pg-sub">${p.sub}</div>` : ''}
  </div>`).join('');

  const addr = state.delivery === 'delivery' ? `
  <div class="field">
    <label>Endereço de entrega</label>
    <input type="text" placeholder="Rua, número, bairro, cidade..." value="${state.address.replace(/"/g,'&quot;')}"
      oninput="state.address=this.value" />
  </div>` : '';

  return `<p class="section-title">Pagamento</p>
  <p class="section-sub">Como você vai pagar?</p>
  <div class="pgto-grid">${pgtos}</div>
  <p class="section-title" style="margin-top:8px;">Entrega</p>
  <p class="section-sub">Como prefere receber?</p>
  <div class="dlv-grid">
    <div class="dlv-btn${state.delivery==='delivery'?' selected':''}" onclick="state.delivery='delivery';render()">
      <div class="dv-icon">🛵</div><div class="dv-label">Delivery</div>
      <div style="font-size:10px;color:#888;margin-top:2px;">ABCDM e São Paulo</div>
    </div>
    <div class="dlv-btn${state.delivery==='retirada'?' selected':''}" onclick="state.delivery='retirada';render()">
      <div class="dv-icon">🏪</div><div class="dv-label">Retirada</div>
      <div style="font-size:10px;color:#888;margin-top:2px;">Retire no local</div>
    </div>
  </div>${addr}`;
}

function renderStep3() {
  return `<p class="section-title">Observações</p>
  <p class="section-sub">Alguma instrução especial?</p>
  <div class="field">
    <label>Observação (opcional)</label>
    <textarea rows="5" placeholder="Ex: sem cebola no item 7, molho à parte, alergia a glúten..."
      oninput="state.obs=this.value">${state.obs}</textarea>
  </div>
  <div style="background:#f9f9f9;border-radius:10px;padding:12px 14px;font-size:12px;color:#666;line-height:1.9;">
    <b style="color:#1a1a1a;">Resumo:</b><br>
    📦 ${state.mode==='kit' ? 'Kit — '+state.kit.name : 'Avulso — '+totalQty()+' itens'}<br>
    💳 ${PGTOS.find(p=>p.id===state.payment)?.label}${state.payment==='pix'?' <span style="color:#2E7D32;">✓ 3% off</span>':''}<br>
    🚗 ${state.delivery==='delivery' ? 'Delivery' : 'Retirada'}
  </div>`;
}

function renderStep4() {
  const {sub,vd,after,pix,total} = calcTotal();
  const pgLabel = PGTOS.find(p=>p.id===state.payment)?.label || '';

  let itemsHtml = '';
  if (state.mode === 'kit' && state.kit) {
    itemsHtml = `<div class="summ-items"><div class="summ-item">
      <div class="summ-item-num">📦</div>
      <div class="summ-item-name">${state.kit.name} — ${state.kit.qty} refeições</div>
      <div class="summ-item-price">${fmt(state.kit.price)}</div>
    </div></div>`;
  } else {
    const rows = Object.entries(state.cart).map(([id,q]) => {
      const it = itemMap[Number(id)]; if (!it) return '';
      return `<div class="summ-item">
        <div class="summ-item-num">#${id}</div>
        <div class="summ-item-name">${q>1?q+'x ':''}<span style="font-size:11px;">${it.name}</span></div>
        <div class="summ-item-price">${fmt(it.price*q)}</div>
      </div>`;
    }).join('');
    itemsHtml = `<div class="summ-items">${rows}</div>`;
  }

  return `<p class="section-title">Resumo do Pedido</p>
  <p class="section-sub">Confira e envie pelo WhatsApp</p>
  ${itemsHtml}
  <div class="summ-block">
    <div class="summ-row"><span class="summ-label">Subtotal</span><span class="summ-value">${fmt(sub)}</span></div>
    ${vd>0?`<div class="summ-row"><span class="summ-label">Desconto volume (${(vd*100).toFixed(0)}%)</span><span class="summ-discount">−${fmt(sub*vd)}</span></div>`:''}
    ${pix>0?`<div class="summ-row"><span class="summ-label">Desconto PIX (3%)</span><span class="summ-discount">−${fmt(pix)}</span></div>`:''}
    <div class="summ-row total"><span>Total</span><span>${fmt(total)}</span></div>
  </div>
  <div class="summ-block" style="font-size:12px;color:#555;line-height:1.9;">
    <div><b style="color:#1a1a1a;">💳 Pagamento:</b> ${pgLabel}${state.payment==='pix'?' — Chave CNPJ: 17.639.559/0001-69':''}</div>
    <div><b style="color:#1a1a1a;">🚗 Entrega:</b> ${state.delivery==='delivery'?'Delivery'+(state.address?' — '+state.address:''):'Retirada no local'}</div>
    ${state.obs?`<div><b style="color:#1a1a1a;">📝 Obs:</b> ${state.obs}</div>`:''}
  </div>`;
}

function generateMsg() {
  const {sub,vd,after,pix,total} = calcTotal();
  let m = '🍱 *PEDIDO CDC FIT*\n\n';
  m += `📦 *Tipo:* ${state.mode==='kit'?'Kit':'Avulso'}\n`;
  m += `🚗 *Entrega:* ${state.delivery==='delivery'?'Delivery':'Retirada'}\n`;
  if (state.delivery==='delivery' && state.address) m += `📍 *Endereço:* ${state.address}\n`;
  m += `💳 *Pagamento:* ${PGTOS.find(p=>p.id===state.payment)?.label}${state.payment==='pix'?' (3% off)':''}\n\n*Itens:*\n`;
  if (state.mode==='kit' && state.kit) {
    m += `✅ ${state.kit.name} — ${state.kit.qty} refeições — ${fmt(state.kit.price)}\n`;
  } else {
    Object.entries(state.cart).forEach(([id,q]) => {
      const it = itemMap[Number(id)];
      if (it) m += `• ${q>1?q+'x ':''}#${id} ${it.name} — ${fmt(it.price*q)}\n`;
    });
  }
  m += `\n*Subtotal:* ${fmt(sub)}`;
  if (vd > 0) m += `\n*Desconto volume (${(vd*100).toFixed(0)}%):* −${fmt(sub*vd)}`;
  if (pix > 0) m += `\n*Desconto PIX (3%):* −${fmt(pix)}`;
  m += `\n*TOTAL: ${fmt(total)}*`;
  if (state.obs) m += `\n\n📝 *Obs:* ${state.obs}`;
  m += '\n\nObrigado! 😊';
  return m;
}

function sendWA() {
  window.open('https://wa.me/' + WA + '?text=' + encodeURIComponent(generateMsg()), '_blank');
}

function copyOrder() {
  const msg = generateMsg();
  const btn = document.getElementById('copy-btn');
  const done = () => { if(btn){btn.textContent='✓ Copiado!'; setTimeout(()=>{btn.textContent='📋 Copiar';},2000);} };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(msg).then(done).catch(() => {
      const ta=document.createElement('textarea');ta.value=msg;
      document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done();
    });
  } else {
    const ta=document.createElement('textarea');ta.value=msg;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done();
  }
}

function renderBottom() {
  const bar = document.getElementById('bottom-bar'); if (!bar) return;
  const ok = canNext();
  if (state.step===0) bar.innerHTML=`<button class="btn btn-next"${ok?'':' disabled'} onclick="goStep(1)">Continuar →</button>`;
  else if (state.step===1) bar.innerHTML=`<button class="btn btn-back" onclick="goStep(0)">← Voltar</button><button class="btn btn-next"${ok?'':' disabled'} onclick="goStep(2)">Próximo →</button>`;
  else if (state.step===2) bar.innerHTML=`<button class="btn btn-back" onclick="goStep(1)">← Voltar</button><button class="btn btn-next"${ok?'':' disabled'} onclick="goStep(3)">Próximo →</button>`;
  else if (state.step===3) bar.innerHTML=`<button class="btn btn-back" onclick="goStep(2)">← Voltar</button><button class="btn btn-next" onclick="goStep(4)">Ver Resumo →</button>`;
  else bar.innerHTML=`<button class="btn btn-copy" id="copy-btn" onclick="copyOrder()">📋 Copiar</button><button class="btn btn-wa" onclick="sendWA()">🟢 WhatsApp</button>`;
}

function render() {
  const c = document.getElementById('content-area'); if (!c) return;
  renderSteps();
  document.getElementById('cart-count-hdr').textContent = totalQty();
  renderBottom();
  if (state.step===0) c.innerHTML = renderStep0();
  else if (state.step===1) c.innerHTML = state.mode==='kit' ? renderStep1Kit() : renderStep1Avulso();
  else if (state.step===2) c.innerHTML = renderStep2();
  else if (state.step===3) c.innerHTML = renderStep3();
  else c.innerHTML = renderStep4();
}

render();
</script>
</body>
</html>
